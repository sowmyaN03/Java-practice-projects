<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>User Registration</title>
</head>
<body>
	<form action="/register" method = "POST"><br>
	<label>Name: </label>
	<input type = "text" name = "name" required = "required"><br><br>
	<label>Phone number: </label>
	<input type = "number" name = "phone" required = "required"><br><br>
	<label>Email: </label>
	<input type = "email" name = "email" required = "required"><br><br>
	<label>Password: </label>
	<input type = "password" name = "password" required = "required"><br><br>
	<button type = "submit">SignUp</button><br><br>
	</form>
	<a href="/login">Already Signed Up? Click here to Login</a>
</body>
</html>
